name: Dependency submission

on:
  push:
    branches:
      - main
    paths:
      - build.gradle.kts
      - settings.gradle.kts
      - gradle.properties
      - gradle/**
      - .github/workflows/dependency-submission.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-submission-${{ github.ref }}
  cancel-in-progress: true

jobs:
  submit:
    name: Submit Gradle dependency graph
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          additional-arguments: --no-daemon --console=plain
          dependency-graph: generate-and-submit
